<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFF3E0">
<title>Kids Meal Picker 🍽️</title>
<!--
  ================================================================
  Kids Meal Picker — Version 1.0
  Standalone web app. 100% in-browser. No external services.
  Tech: HTML + CSS + JavaScript only. Data saved in localStorage.

  CODE STRUCTURE (modular — each block below can later be split
  into its own file: data.js, store.js, speech.js, mealAI.js,
  screens.js, parent.js, app.js):
    1. CSS design system (pastel, big buttons, kid-friendly)
    2. DB module      → window.KMP_FOOD_DB (413 foods)
    3. Store module   → State + localStorage persistence
    4. Speech module  → Web Speech API wrapper (safe fallback)
    5. MealAI module  → dish builder + healthy score + tips
    6. Screens module → all kid-facing screens (router)
    7. Parent module  → PIN, dashboard, reports, charts, export
    8. App module     → boot + global wiring
  ================================================================
-->
<style>
/* ============================================================
   1. DESIGN SYSTEM  —  pastel tokens, big touch targets
   Inspired by Apple / Disney / Nintendo / Duolingo / Kids Space
   ============================================================ */
:root{
  --cream:#FFF9F0; --cream2:#FFF3E0;
  --ink:#4A3B32; --ink-soft:#7A6A5E;
  --peach:#FFB4A2; --peach-d:#F98D74;
  --mint:#9EE7C9; --mint-d:#4FC59A;
  --sky:#A6D8F5; --sky-d:#5FB3E8;
  --sun:#FFE08A; --sun-d:#F5C33B;
  --grape:#D9B8F0; --grape-d:#B583E0;
  --rose:#FFC2D6; --rose-d:#F58BAE;
  --card:#FFFFFF; --line:#F0E4D6;
  --good:#4FC59A; --warn:#F5C33B;
  --shadow:0 10px 26px rgba(120,90,60,.16);
  --shadow-lg:0 18px 44px rgba(120,90,60,.22);
  --r:26px; --r-sm:16px;
  --fx:'Baloo 2','Fredoka',system-ui,sans-serif;
  --font:'Baloo 2','Fredoka','Sarabun',system-ui,-apple-system,'Segoe UI',sans-serif;
}
/* Category accent colors */
.c-carb{--acc:var(--sun);--acc-d:var(--sun-d);}
.c-protein{--acc:var(--peach);--acc-d:var(--peach-d);}
.c-veg{--acc:var(--mint);--acc-d:var(--mint-d);}
.c-fruit{--acc:var(--rose);--acc-d:var(--rose-d);}
.c-drink{--acc:var(--sky);--acc-d:var(--sky-d);}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font);
  background:linear-gradient(160deg,var(--cream) 0%,var(--cream2) 100%);
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
  font-size:18px;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;color:inherit;}
img{max-width:100%;}

/* Floating background blobs */
.bg-blobs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(6px);opacity:.35;animation:float 9s ease-in-out infinite;}
.blob:nth-child(1){width:180px;height:180px;background:var(--peach);top:-40px;left:-30px;}
.blob:nth-child(2){width:140px;height:140px;background:var(--sky);bottom:8%;right:-30px;animation-delay:1.5s;}
.blob:nth-child(3){width:120px;height:120px;background:var(--mint);top:40%;left:-40px;animation-delay:3s;}
.blob:nth-child(4){width:90px;height:90px;background:var(--sun);top:12%;right:10%;animation-delay:2s;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-22px)}}

.app{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:16px 16px 120px;}

/* Top bar */
.topbar{display:flex;align-items:center;gap:10px;padding:8px 4px 14px;position:sticky;top:0;z-index:20;
  background:linear-gradient(180deg,var(--cream) 70%,transparent);backdrop-filter:blur(2px);}
.btn-round{width:52px;height:52px;border-radius:50%;background:var(--card);box-shadow:var(--shadow);
  font-size:24px;display:grid;place-items:center;transition:transform .12s,box-shadow .12s;flex:0 0 auto;}
.btn-round:active{transform:scale(.9);}
.btn-round.on{background:var(--sun);}
.topbar .spacer{flex:1;}
.crumb{font-weight:800;font-size:20px;display:flex;align-items:center;gap:8px;color:var(--ink);}
.chip-user{background:var(--card);box-shadow:var(--shadow);border-radius:999px;padding:6px 14px 6px 8px;
  display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;}
.chip-user .av{font-size:22px;}

/* Screens fade/slide */
.screen{animation:pop .35s cubic-bezier(.2,.9,.3,1.2);}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.hidden{display:none!important;}

h1.big{font-size:clamp(26px,6vw,40px);margin:6px 0 4px;font-weight:800;letter-spacing:.3px;}
.sub{color:var(--ink-soft);font-weight:600;margin:0 0 20px;font-size:17px;}

/* Big selection cards (users, meals) */
.card-grid{display:grid;gap:16px;}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:720px){.grid-3{grid-template-columns:1fr;}.grid-2{grid-template-columns:1fr;}}

.big-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:26px 18px;
  text-align:center;transition:transform .15s,box-shadow .15s;border:4px solid transparent;position:relative;overflow:hidden;}
.big-card:active{transform:scale(.96);}
.big-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-4px);}
.big-card .emo{font-size:76px;line-height:1;display:block;margin-bottom:8px;filter:drop-shadow(0 6px 6px rgba(0,0,0,.12));}
.big-card .nm{font-size:26px;font-weight:800;}
.big-card .age{color:var(--ink-soft);font-weight:600;font-size:15px;margin-top:2px;}
.big-card .ribbon{position:absolute;top:12px;right:-30px;transform:rotate(38deg);background:var(--sun-d);
  color:#fff;font-weight:800;font-size:12px;padding:4px 34px;}
.big-card.u-hana{border-color:var(--rose);}
.big-card.u-haki{border-color:var(--sky);}
.big-card.u-both{border-color:var(--grape);}

/* Meal picker tiles */
.meal-tile{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:22px;
  display:flex;align-items:center;gap:18px;transition:transform .15s;border:4px solid transparent;}
.meal-tile:active{transform:scale(.97);}
.meal-tile .emo{font-size:56px;}
.meal-tile .txt{text-align:left;}
.meal-tile .txt b{font-size:24px;display:block;}
.meal-tile .txt span{color:var(--ink-soft);font-weight:600;}
.meal-tile.done{border-color:var(--good);}
.meal-tile .badge-done{margin-left:auto;background:var(--good);color:#fff;font-weight:800;border-radius:999px;padding:6px 12px;font-size:14px;}

/* ===== Meal Builder ===== */
.builder-wrap{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start;}
@media(max-width:920px){.builder-wrap{grid-template-columns:1fr;}}

.cat-tabs{display:flex;gap:10px;overflow-x:auto;padding:4px 2px 12px;scrollbar-width:none;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{flex:0 0 auto;background:var(--card);box-shadow:var(--shadow);border-radius:999px;
  padding:12px 18px;font-weight:800;font-size:17px;display:flex;align-items:center;gap:8px;border:3px solid transparent;
  transition:transform .12s;}
.cat-tab:active{transform:scale(.94);}
.cat-tab.active{border-color:var(--acc-d);background:var(--acc);}
.cat-tab .n{background:rgba(0,0,0,.08);border-radius:999px;padding:1px 8px;font-size:13px;}

.food-scroll{max-height:60vh;overflow-y:auto;padding:6px 2px 10px;margin-top:6px;}
.search{width:100%;padding:14px 18px;border-radius:var(--r-sm);border:3px solid var(--line);
  background:var(--card);font-size:17px;font-weight:600;margin-bottom:12px;outline:none;}
.search:focus{border-color:var(--acc-d);}

.food-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:12px;}
.food-cell{background:var(--card);border-radius:var(--r-sm);box-shadow:var(--shadow);padding:12px 6px 10px;
  text-align:center;transition:transform .12s;position:relative;border:3px solid transparent;}
.food-cell:active{transform:scale(.9);}
.food-cell .fe{font-size:44px;line-height:1;display:block;filter:drop-shadow(0 4px 4px rgba(0,0,0,.1));}
.food-cell .fn{font-size:13px;font-weight:700;margin-top:4px;line-height:1.15;height:2.3em;overflow:hidden;}
.food-cell .plus{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;
  background:var(--acc-d);color:#fff;font-weight:900;font-size:18px;display:grid;place-items:center;box-shadow:var(--shadow);}
.food-cell .cnt{position:absolute;top:6px;left:6px;background:var(--good);color:#fff;font-weight:800;
  border-radius:999px;font-size:12px;padding:1px 7px;display:none;}
.food-cell.picked{border-color:var(--good);}
.food-cell.picked .cnt{display:block;}

/* Plate panel */
.plate{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-lg);padding:18px;position:sticky;top:78px;}
.plate h3{margin:0 0 4px;font-size:22px;display:flex;align-items:center;gap:8px;}
.score-ring{display:flex;align-items:center;gap:14px;margin:10px 0 6px;}
.ring{width:92px;height:92px;flex:0 0 auto;}
.score-txt b{font-size:34px;line-height:1;}
.score-txt span{color:var(--ink-soft);font-weight:600;}
.stars{font-size:24px;letter-spacing:2px;margin-top:2px;}
.tip{background:var(--cream2);border-radius:var(--r-sm);padding:12px 14px;font-weight:700;
  color:var(--ink);margin:12px 0;line-height:1.4;font-size:15px;border-left:6px solid var(--sun-d);animation:pop .4s;}
.plate-items{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto;margin-bottom:8px;}
.pi{display:flex;align-items:center;gap:10px;background:var(--cream);border-radius:12px;padding:8px 10px;font-weight:700;}
.pi .pe{font-size:24px;}
.pi .px{margin-left:auto;width:30px;height:30px;border-radius:50%;background:#fff;box-shadow:var(--shadow);
  font-size:16px;display:grid;place-items:center;}
.pi .qty{background:var(--acc-d,#999);color:#fff;border-radius:999px;font-size:12px;padding:1px 7px;font-weight:800;}
.plate-empty{color:var(--ink-soft);text-align:center;padding:24px 6px;font-weight:600;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;
  font-weight:800;font-size:18px;padding:14px 22px;box-shadow:var(--shadow);transition:transform .12s,filter .12s;}
.btn:active{transform:scale(.95);}
.btn-primary{background:linear-gradient(135deg,var(--mint),var(--mint-d));color:#fff;width:100%;font-size:20px;padding:16px;}
.btn-soft{background:var(--card);}
.btn-warn{background:linear-gradient(135deg,var(--sun),var(--sun-d));color:#7a5a10;}
.btn-ghost{background:transparent;box-shadow:none;color:var(--ink-soft);font-weight:700;}
.btn-danger{background:linear-gradient(135deg,var(--peach),var(--peach-d));color:#fff;}
/* Confirm modal action buttons */
.modal-card .confirm-title{font-size:23px;margin:6px 0 6px;line-height:1.35;}

/* Food detail modal */
.modal{position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:18px;
  background:rgba(74,59,50,.42);backdrop-filter:blur(4px);animation:pop .25s;}
.modal-card{background:var(--card);border-radius:28px;box-shadow:var(--shadow-lg);max-width:420px;width:100%;
  padding:26px 24px;text-align:center;position:relative;animation:pop .3s;}
.modal-card .big-emo{font-size:110px;line-height:1;filter:drop-shadow(0 10px 10px rgba(0,0,0,.15));}
.modal-card h2{margin:6px 0 0;font-size:30px;}
.modal-card .en{color:var(--ink-soft);font-weight:600;font-size:18px;margin-bottom:8px;}
.tagrow{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0;}
.tag{background:var(--cream2);border-radius:999px;padding:6px 14px;font-weight:700;font-size:14px;}
.tag.vit{background:var(--sky);} .tag.raw{background:var(--mint);} .tag.age{background:var(--grape);}
.benefit{background:var(--cream2);border-radius:16px;padding:12px 14px;font-weight:700;margin:10px 0 16px;line-height:1.45;}
.modal-actions{display:flex;gap:10px;}
.modal-actions .btn{flex:1;}
.close-x{position:absolute;top:12px;right:12px;width:40px;height:40px;border-radius:50%;background:var(--cream2);
  font-size:22px;display:grid;place-items:center;}

/* Result / celebration */
.result-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-lg);padding:26px;text-align:center;}
.result-card .party{font-size:70px;animation:pop .5s;}
.dish-list{display:flex;flex-direction:column;gap:10px;margin:18px 0;text-align:left;}
.dish{display:flex;align-items:center;gap:14px;background:var(--cream2);border-radius:18px;padding:14px 16px;font-weight:800;font-size:19px;}
.dish .de{font-size:38px;}
.dish small{display:block;color:var(--ink-soft);font-weight:600;font-size:14px;}
.desc-box{background:linear-gradient(135deg,var(--mint),var(--sky));color:#20463b;border-radius:20px;
  padding:16px;font-weight:800;font-size:18px;line-height:1.5;margin:8px 0 18px;}

/* Confetti */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:70;overflow:hidden;}
.cf{position:absolute;width:12px;height:12px;top:-20px;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}

/* ===== Parent dashboard ===== */
.pin-pad{max-width:340px;margin:20px auto;text-align:center;}
.pin-dots{display:flex;gap:14px;justify-content:center;margin:18px 0;}
.pin-dot{width:20px;height:20px;border-radius:50%;background:var(--line);transition:transform .15s;}
.pin-dot.on{background:var(--grape-d);transform:scale(1.2);}
.pin-keys{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.pin-key{background:var(--card);box-shadow:var(--shadow);border-radius:18px;padding:18px;font-size:26px;font-weight:800;transition:transform .1s;}
.pin-key:active{transform:scale(.92);background:var(--grape);}
.pin-hint{color:var(--ink-soft);font-weight:600;margin-top:12px;font-size:14px;}
.pin-err{color:var(--peach-d);font-weight:800;min-height:22px;}

.seg{display:flex;gap:8px;background:var(--card);border-radius:999px;padding:6px;box-shadow:var(--shadow);margin-bottom:16px;flex-wrap:wrap;}
.seg button{flex:1;min-width:90px;border-radius:999px;padding:10px;font-weight:800;font-size:15px;background:transparent;color:var(--ink-soft);}
.seg button.active{background:var(--grape);color:var(--ink);}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
@media(max-width:720px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
.stat{background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:16px;text-align:center;}
.stat .v{font-size:30px;font-weight:800;}
.stat .l{color:var(--ink-soft);font-weight:600;font-size:14px;}
.stat .ic{font-size:26px;}

.panel{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:20px;margin-bottom:16px;}
.panel h3{margin:0 0 14px;font-size:20px;display:flex;align-items:center;gap:8px;}
.report-line{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line);font-weight:600;}
.report-line:last-child{border:none;}
.report-line .k{color:var(--ink-soft);} .report-line .v{margin-left:auto;font-weight:800;}
.pill-list{display:flex;flex-wrap:wrap;gap:8px;}
.pill{background:var(--cream2);border-radius:999px;padding:6px 12px;font-weight:700;font-size:14px;}

.behavior{background:linear-gradient(135deg,var(--rose),var(--grape));color:#4a2b3b;border-radius:20px;
  padding:18px;font-weight:700;line-height:1.6;font-size:16px;}

.bars{display:flex;align-items:flex-end;gap:10px;height:170px;padding:10px 4px 0;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;}
.bar{width:100%;max-width:46px;border-radius:10px 10px 4px 4px;background:linear-gradient(180deg,var(--mint-d),var(--mint));
  transition:height .5s cubic-bezier(.2,.9,.3,1.2);min-height:4px;}
.bar-col .bl{font-size:12px;color:var(--ink-soft);font-weight:700;}
.bar-col .bv{font-size:13px;font-weight:800;}

.export-row{display:flex;gap:12px;flex-wrap:wrap;}
.export-row .btn{flex:1;min-width:140px;}

/* Sound toggle floating note */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;
  background:var(--ink);color:#fff;font-weight:700;padding:12px 20px;border-radius:999px;z-index:90;
  transition:.3s;box-shadow:var(--shadow-lg);pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Bottom nav for kid flow */
.fab-bar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;justify-content:center;padding:12px;
  background:linear-gradient(0deg,var(--cream) 60%,transparent);}
.fab-bar .btn{max-width:520px;width:100%;}

.section-title{font-weight:800;font-size:19px;margin:18px 0 10px;display:flex;align-items:center;gap:8px;}
.note{color:var(--ink-soft);font-weight:600;font-size:14px;}
@media print{.no-print{display:none!important;} body{background:#fff;} .app{padding:0;}}
</style>
</head>

<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   3. STORE MODULE  —  app state + localStorage persistence
   ============================================================ */
const Store = (function(){
  const KEY='kmp_v1_state';
  const PIN_KEY='kmp_v1_pin';
  const today=()=> new Date().toISOString().slice(0,10);

  const def={
    currentUser:null,          // 'hana' | 'haki' | 'both'
    soundOn:true,
    // meals[user][date][mealType] = { items:[{id,qty}], score, ts }
    meals:{ hana:{}, haki:{} }
  };
  let state=load();

  function load(){
    try{ const raw=localStorage.getItem(KEY); if(raw){ const s=JSON.parse(raw);
      return Object.assign({},def,s,{meals:Object.assign({hana:{},haki:{}},s.meals||{})}); } }
    catch(e){}
    return JSON.parse(JSON.stringify(def));
  }
  function save(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} }

  // ---- PIN (default 1234, parent can change) ----
  function getPin(){ return localStorage.getItem(PIN_KEY)||'1234'; }
  function setPin(p){ localStorage.setItem(PIN_KEY,p); }

  // Which real kids a session writes to (both → writes to both)
  function targetUsers(){
    if(state.currentUser==='both') return ['hana','haki'];
    return [state.currentUser];
  }

  function saveMeal(mealType, items, score){
    const d=today();
    targetUsers().forEach(u=>{
      if(!state.meals[u][d]) state.meals[u][d]={};
      state.meals[u][d][mealType]={ items:items.map(i=>({id:i.id,qty:i.qty})), score, ts:Date.now() };
    });
    save();
  }
  function getMeal(user, date, mealType){
    return (state.meals[user]||{})[date] ? state.meals[user][date][mealType] : null;
  }
  function getDay(user,date){ return (state.meals[user]||{})[date]||{}; }

  return {
    get state(){return state;},
    save, today,
    getPin,setPin,
    setUser(u){state.currentUser=u; state.soundOn = (u==='haki')?true:state.soundOn; save();},
    toggleSound(){state.soundOn=!state.soundOn; save(); return state.soundOn;},
    saveMeal,getMeal,getDay,targetUsers,
    reset(){ state=JSON.parse(JSON.stringify(def)); save(); },
    // Clears ONLY the meal history. PIN lives under a separate key and is untouched.
    clearMeals(){ state.meals={hana:{},haki:{}}; save(); }
  };
})();

/* ============================================================
   4. SPEECH MODULE  —  Web Speech API, safe fallback
   Haki (age 5, non-reader) → auto voice. Hana → toggleable.
   ============================================================ */
const Speech = (function(){
  const supported = 'speechSynthesis' in window;
  let thVoice=null;
  function pickVoice(){
    if(!supported) return;
    const vs=speechSynthesis.getVoices();
    thVoice = vs.find(v=>/th(-|_)?TH/i.test(v.lang)||/thai/i.test(v.name)) || vs.find(v=>/th/i.test(v.lang)) || null;
  }
  if(supported){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }

  function say(text){
    if(!supported || !Store.state.soundOn) return;
    try{
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.lang='th-TH'; if(thVoice)u.voice=thVoice;
      u.rate=.95; u.pitch=1.12; u.volume=1;
      speechSynthesis.speak(u);
    }catch(e){/* never crash */}
  }
  return { supported, say, stop(){ if(supported)try{speechSynthesis.cancel();}catch(e){} } };
})();

/* ============================================================
   5. MEAL-AI MODULE
   - builds real dishes from raw ingredients
   - computes healthy score (0-100) + stars
   - positive-only tips
   ============================================================ */
const MealAI = (function(){
  const DB = window.KMP_FOOD_DB;
  const byId = Object.fromEntries(DB.map(f=>[f.id,f]));

  // cooking verbs by category → makes a "dish" name
  function dishName(f){
    const c=f.cat;
    if(c==='carb'){
      if(/ข้าวสวย|ข้าวหอม|ข้าวกล้อง|ไรซ์|ข้าวนึ่ง|สังข์หยด/.test(f.th)) return f.th;
      if(/เส้น|หมี่|บะหมี่|วุ้นเส้น|อุด้ง|สปาเก|มักกะโรนี|ขนมจีน|ก๋วยจั๊บ/.test(f.th)) return f.th+'ลวก';
      if(/ขนมปัง|โรตี|ตอติญ่า|พิต้า/.test(f.th)) return f.th+'ปิ้ง';
      if(/มัน|เผือก|ฟักทอง|ข้าวโพด/.test(f.th)) return f.th+'นึ่ง';
      return f.th;
    }
    if(c==='protein'){
      if(/ไข่ต้ม|ไข่ดาว|ไข่เจียว/.test(f.th)) return f.th;
      if(/ไข่/.test(f.th)) return f.th+'ต้ม';
      if(/เต้าหู้/.test(f.th)) return f.th+'นึ่ง';
      if(/กุ้ง|ปู|หอย|ปลาหมึก/.test(f.th)) return f.th+'นึ่ง';
      if(/ปลา/.test(f.th)) return f.th+'นึ่ง';
      if(/ถั่ว|เม็ด|อัลมอนด์|วอลนัท|เทมเป้/.test(f.th)) return f.th+'อบ';
      return f.th+'อบ';
    }
    if(c==='veg'){
      if(/สลัด|กาดหอม|โอ๊ค|คอส|ร็อกเก็ต|วอเตอร์เครส|แตงกวา|มะเขือเทศ/.test(f.th)) return f.th+'สด';
      return f.th+'ลวก';
    }
    if(c==='fruit') return f.th;      // fruit served fresh
    if(c==='drink') return f.th;
    return f.th;
  }

  // Aggregate plate items [{id,qty}] → grouped {cat:[items]}
  function groupByCat(items){
    const g={carb:[],protein:[],veg:[],fruit:[],drink:[]};
    items.forEach(it=>{ const f=byId[it.id]; if(f) g[f.cat].push({f,qty:it.qty}); });
    return g;
  }

  // Real-time healthy score. Rewards variety & balance across groups.
  function score(items){
    if(!items.length) return {score:0,stars:0};
    const g=groupByCat(items);
    const cats=['carb','protein','veg','fruit','drink'];   // แป้ง included & equal
    let pts=0;
    // 1) Group balance — all 5 groups count equally (18 each → 90 when complete).
    //    Choosing carb/protein/veg/fruit/drink each present gives a full 90.
    const groupsPresent=cats.filter(c=>g[c].length).length;
    pts += groupsPresent*18;                                // 0..90
    // 2) Variety bonus (extra distinct kinds beyond the first) — up to 10 total.
    const kinds=c=>new Set(g[c].map(x=>x.f.id)).size;
    const extra=c=>Math.max(kinds(c)-1,0);
    pts += Math.min(extra('veg'),2)*2;      // up to 4
    pts += Math.min(extra('fruit'),1)*2;    // up to 2
    pts += Math.min(extra('protein'),1)*2;  // up to 2
    pts += Math.min(extra('carb'),1)*2;     // up to 2  (carb variety rewarded too)
    let s=Math.max(0,Math.min(100,Math.round(pts)));
    const stars=s>=90?5:s>=72?4:s>=54?3:s>=34?2:s>=1?1:0;
    return {score:s,stars};
  }

  // Positive-only suggestion — never negative, never forces.
  function tip(items){
    const g=groupByCat(items);
    if(!items.length) return {emo:'👋',text:'เริ่มเลือกอาหารที่หนูชอบได้เลยนะ'};
    if(!g.protein.length) return {emo:'🍗',text:'ลองเพิ่มโปรตีนอีกหนึ่งอย่างนะ จะได้แข็งแรง'};
    if(!g.veg.length)     return {emo:'🥦',text:'ลองเพิ่มผักอีกหนึ่งอย่างนะ มื้อนี้จะสดใสขึ้น'};
    if(!g.fruit.length)   return {emo:'🍎',text:'ถ้าเพิ่มผลไม้อีกชนิด มื้อนี้จะสมดุลมากขึ้น'};
    if(!g.carb.length)    return {emo:'🍚',text:'เพิ่มข้าวหรือแป้งสักหน่อย จะได้มีแรงเล่นทั้งวัน'};
    if(!g.drink.length)   return {emo:'🥛',text:'เลือกเครื่องดื่มดี ๆ สักแก้วก็เยี่ยมเลยนะ'};
    const vegKinds=new Set(g.veg.map(x=>x.f.id)).size;
    if(vegKinds<2)        return {emo:'🌈',text:'เก่งมาก! ลองเพิ่มผักอีกสีจะยิ่งครบเลย'};
    return {emo:'🌟',text:'สุดยอดไปเลย! จานนี้ครบทุกหมู่แล้ว'};
  }

  // Turn plate into a menu (list of dishes) + friendly description
  function buildMenu(items){
    const g=groupByCat(items);
    const dishes=[];
    ['carb','protein','veg','fruit','drink'].forEach(c=>{
      g[c].forEach(({f,qty})=>{
        dishes.push({emoji:f.emoji,name:dishName(f),cat:c,
          sub:f.benefit, qty});
      });
    });
    // description mentions which groups are present
    const names={carb:'คาร์โบไฮเดรต',protein:'โปรตีน',veg:'ผัก',fruit:'ผลไม้',drink:'เครื่องดื่ม'};
    const present=Object.keys(names).filter(c=>g[c].length).map(c=>names[c]);
    let desc;
    if(present.length>=4) desc='มื้อนี้ครบเครื่องมาก มีทั้ง '+present.join(' ')+' — เยี่ยมไปเลย! 🌟';
    else if(present.length) desc='มื้อนี้มี '+present.join(' ')+' อร่อยและมีประโยชน์นะ 😋';
    else desc='เลือกอาหารเพิ่มอีกนิดเพื่อจานที่อร่อยครบถ้วนนะ';
    return {dishes,desc};
  }

  return { byId, dishName, score, tip, buildMenu, groupByCat, DB };
})();
</script>

<script>
/* ============================================================
   6. SCREENS MODULE  —  kid-facing router + views
   ============================================================ */
const App = (function(){
  const app=document.getElementById('app');
  const DB=window.KMP_FOOD_DB;
  const CAT={
    carb:{emo:'🍚',th:'คาร์โบไฮเดรต',short:'แป้ง'},
    protein:{emo:'🍗',th:'โปรตีน',short:'โปรตีน'},
    veg:{emo:'🥦',th:'ผัก',short:'ผัก'},
    fruit:{emo:'🍎',th:'ผลไม้',short:'ผลไม้'},
    drink:{emo:'🥛',th:'เครื่องดื่ม',short:'ดื่ม'}
  };
  const MEALS={
    breakfast:{emo:'🍳',th:'อาหารเช้า',en:'Breakfast'},
    lunch:{emo:'🍱',th:'อาหารกลางวัน',en:'Lunch'},
    dinner:{emo:'🍽️',th:'อาหารเย็น',en:'Dinner'},
    snack:{emo:'🍎',th:'ของว่าง',en:'Snack'}
  };
  const USERS={
    hana:{emo:'👧',nm:'ฮานะ',age:'9 ขวบ'},
    haki:{emo:'🧒',nm:'ฮาคิ',age:'5 ขวบ'},
    both:{emo:'👧🧒',nm:'ฮานะ + ฮาคิ',age:'เล่นด้วยกัน'}
  };

  // transient builder state
  let cur={ meal:null, cat:'carb', plate:[], search:'' };

  /* ---------- helpers ---------- */
  function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}
  function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
    clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1600);}
  function userLabel(){const u=USERS[Store.state.currentUser];return u?u.emo+' '+u.nm:'';}

  function topbar(title, back){
    const sound=Store.state.soundOn;
    return `
    <div class="topbar no-print">
      ${back?`<button class="btn-round" onclick="App.go('${back}')" aria-label="กลับ">⬅️</button>`:''}
      <div class="crumb">${title||''}</div>
      <div class="spacer"></div>
      ${Store.state.currentUser?`<div class="chip-user"><span class="av">${USERS[Store.state.currentUser].emo}</span>${USERS[Store.state.currentUser].nm}</div>`:''}
      <button class="btn-round" id="btnReplay" onclick="App.replay()" title="ฟังอีกครั้ง" aria-label="ฟังอีกครั้ง">🔊</button>
      <button class="btn-round ${sound?'on':''}" id="btnSound" onclick="App.toggleSound()" title="เปิด/ปิดเสียง" aria-label="เปิดหรือปิดเสียง">${sound?'🔈':'🔇'}</button>
    </div>`;
  }
  let lastSpoken='';
  function speak(t){ lastSpoken=t; Speech.say(t); }

  /* ---------- SCREEN: user select (home) ---------- */
  function screenHome(){
    Store.state.currentUser=null;
    app.innerHTML = topbar('Kids Meal Picker 🍽️') + `
      <div class="screen">
        <h1 class="big">วันนี้ใครจะเลือกอาหารเอ่ย? 🎉</h1>
        <p class="sub">แตะการ์ดของหนูเพื่อเริ่มเล่นได้เลย</p>
        <div class="card-grid grid-3">
          <button class="big-card u-hana" onclick="App.pickUser('hana')">
            <span class="emo">👧</span><div class="nm">ฮานะ</div><div class="age">9 ขวบ</div>
          </button>
          <button class="big-card u-haki" onclick="App.pickUser('haki')">
            <span class="emo">🧒</span><div class="nm">ฮาคิ</div><div class="age">5 ขวบ</div>
            <div class="ribbon">มีเสียง</div>
          </button>
          <button class="big-card u-both" onclick="App.pickUser('both')">
            <span class="emo">👧🧒</span><div class="nm">ฮานะ + ฮาคิ</div><div class="age">เล่นด้วยกัน</div>
          </button>
        </div>
        <div style="text-align:center;margin-top:34px" class="no-print">
          <button class="btn btn-soft" onclick="App.go('parentPin')">👨‍👩‍👧 สำหรับผู้ปกครอง</button>
        </div>
      </div>`;
    speak('สวัสดีจ้ะ วันนี้ใครจะเลือกอาหารเอ่ย');
    syncSoundBtns();
  }

  function pickUser(u){
    Store.setUser(u);
    const nm=USERS[u].nm;
    // Haki → auto voice ON already handled in Store.setUser
    if(u==='haki') speak('สวัสดีฮาคิ วันนี้อยากกินมื้อไหนครับ');
    else speak('สวัสดี'+nm+' วันนี้อยากกินมื้อไหน');
    go('mealSelect');
  }

  /* ---------- SCREEN: meal select ---------- */
  function screenMealSelect(){
    const d=Store.today();
    const tiles=Object.entries(MEALS).map(([k,m])=>{
      // "done" if any target user already saved this meal today
      const done=Store.targetUsers().some(u=>Store.getMeal(u,d,k));
      return `<button class="meal-tile ${done?'done':''}" onclick="App.pickMeal('${k}')">
        <span class="emo">${m.emo}</span>
        <div class="txt"><b>${m.th}</b><span>${m.en}</span></div>
        ${done?'<span class="badge-done">✓ เลือกแล้ว</span>':''}
      </button>`;
    }).join('');
    app.innerHTML = topbar('เลือกมื้ออาหาร',  'home') + `
      <div class="screen">
        <h1 class="big">${USERS[Store.state.currentUser].emo} อยากกินมื้อไหนดี?</h1>
        <p class="sub">แตะเลือกมื้อที่หนูอยากทำ แล้วมาสร้างจานสนุก ๆ กัน</p>
        <div class="card-grid grid-2">${tiles}</div>
      </div>`;
    speak('เลือกมื้อที่หนูอยากกินได้เลยนะ');
    syncSoundBtns();
  }
  function pickMeal(k){
    cur={meal:k,cat:'carb',plate:[],search:''};
    speak(MEALS[k].th+' เยี่ยมเลย ต่อไปมาเลือกอาหารกัน');
    go('builder');
  }

  /* ---------- SCREEN: meal builder ---------- */
  function screenBuilder(){
    const m=MEALS[cur.meal];
    const tabs=Object.entries(CAT).map(([k,c])=>{
      const n=cur.plate.filter(p=>MealAI.byId[p.id]&&MealAI.byId[p.id].cat===k).reduce((a,b)=>a+b.qty,0);
      return `<button class="cat-tab c-${k} ${cur.cat===k?'active':''}" onclick="App.setCat('${k}')">
        <span>${c.emo}</span> ${c.short} ${n?`<span class="n">${n}</span>`:''}</button>`;
    }).join('');

    app.innerHTML = topbar(m.emo+' '+m.th, 'mealSelect') + `
      <div class="screen c-${cur.cat}" id="builderRoot">
        <div class="cat-tabs">${tabs}</div>
        <div class="builder-wrap">
          <div>
            <input class="search" id="foodSearch" placeholder="🔍 หาอาหารที่ชอบ..." value="${cur.search||''}"
              oninput="App.onSearch(this.value)">
            <div class="food-scroll"><div class="food-grid" id="foodGrid"></div></div>
          </div>
          <aside class="plate c-${cur.cat}" id="platePanel"></aside>
        </div>
      </div>`;
    renderFoodGrid();
    renderPlate();
    syncSoundBtns();
  }

  function catSpeak(cat){
    const msg={carb:'มาเลือกข้าวหรือแป้งกันนะ',protein:'ต่อไปเลือกเนื้อสัตว์กันนะ',
      veg:'เยี่ยมเลย ต่อไปเลือกผัก',fruit:'สุดยอด ต่อไปเลือกผลไม้',drink:'สุดท้ายเลือกเครื่องดื่มกันนะ'}[cat];
    if(msg) speak(msg);
  }
  function setCat(c){ cur.cat=c; cur.search=''; catSpeak(c);
    // re-render just the tabs/panel accent + grid
    document.getElementById('builderRoot').className='screen c-'+c;
    document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
    document.querySelector('.cat-tab.c-'+c)?.classList.add('active');
    document.getElementById('platePanel').className='plate c-'+c;
    const s=document.getElementById('foodSearch'); if(s)s.value='';
    renderFoodGrid();
  }

  function onSearch(v){ cur.search=v; renderFoodGrid(); }

  function renderFoodGrid(){
    const grid=document.getElementById('foodGrid'); if(!grid)return;
    const q=(cur.search||'').trim().toLowerCase();
    let list=DB.filter(f=>f.cat===cur.cat);
    if(q) list=list.filter(f=>f.th.toLowerCase().includes(q)||f.en.toLowerCase().includes(q));
    list=list.sort((a,b)=>b.pop-a.pop);
    if(!q) list=list.slice(0,80); // keep grid snappy; search reveals the rest
    grid.innerHTML=list.map(f=>{
      const cnt=cur.plate.filter(p=>p.id===f.id).reduce((a,b)=>a+b.qty,0);
      return `<button class="food-cell ${cnt?'picked':''}" onclick="App.openFood('${f.id}')">
        <span class="cnt">×${cnt}</span>
        <span class="plus">+</span>
        <span class="fe">${f.emoji}</span>
        <div class="fn">${f.th}</div>
      </button>`;
    }).join('') || `<p class="note" style="grid-column:1/-1;text-align:center;padding:20px">ลองพิมพ์ชื่ออื่นดูนะ 😊</p>`;
  }

  /* ---------- Food detail modal (Gallery) ---------- */
  function openFood(id){
    const f=MealAI.byId[id]; if(!f)return;
    speak(f.th);
    const raw = f.raw_ok?'กินดิบได้':'ควรทำให้สุก';
    const modal=el(`<div class="modal" onclick="if(event.target===this)App.closeModal()">
      <div class="modal-card c-${f.cat}">
        <button class="close-x" onclick="App.closeModal()" aria-label="ปิด">✕</button>
        <div class="big-emo">${f.emoji}</div>
        <h2>${f.th}</h2>
        <div class="en">${f.en}</div>
        <div class="tagrow">
          <span class="tag vit">วิตามิน ${f.vitamin}</span>
          <span class="tag">${f.cook}</span>
          <span class="tag raw">${raw}</span>
          <span class="tag age">แนะนำ ${f.age}+ ขวบ</span>
        </div>
        <div class="benefit">✨ ${f.benefit}</div>
        <div class="modal-actions">
          <button class="btn btn-soft" onclick="App.speakName('${f.id}')">🔊 ฟังชื่อ</button>
          <button class="btn btn-primary" style="width:auto" onclick="App.addFood('${f.id}')">➕ ใส่จาน</button>
        </div>
      </div></div>`);
    document.body.appendChild(modal);
    App._modal=modal;
  }
  function closeModal(){ if(App._modal){App._modal.remove();App._modal=null;} }
  function speakName(id){ const f=MealAI.byId[id]; if(f)speak(f.th+' '+f.benefit); }

  function addFood(id){
    const ex=cur.plate.find(p=>p.id===id);
    if(ex) ex.qty++; else cur.plate.push({id,qty:1});
    const f=MealAI.byId[id];
    closeModal();
    toast(f.emoji+' ใส่ '+f.th+' แล้ว!');
    speak('เยี่ยม! ใส่'+f.th+'ลงจานแล้ว');
    // refresh tab counts + grid + plate
    refreshBuilderCounts();
    renderFoodGrid();
    renderPlate();
    bump();
  }
  function removeFood(id){
    const i=cur.plate.findIndex(p=>p.id===id);
    if(i>-1){ if(cur.plate[i].qty>1)cur.plate[i].qty--; else cur.plate.splice(i,1); }
    refreshBuilderCounts(); renderFoodGrid(); renderPlate();
  }
  function refreshBuilderCounts(){
    document.querySelectorAll('.cat-tab').forEach(tab=>{
      const cls=[...tab.classList].find(c=>c.startsWith('c-')); if(!cls)return;
      const cat=cls.slice(2);
      const n=cur.plate.filter(p=>MealAI.byId[p.id]&&MealAI.byId[p.id].cat===cat).reduce((a,b)=>a+b.qty,0);
      let badge=tab.querySelector('.n');
      if(n){ if(!badge){badge=document.createElement('span');badge.className='n';tab.appendChild(badge);} badge.textContent=n; }
      else if(badge){ badge.remove(); }
    });
  }

  function renderPlate(){
    const panel=document.getElementById('platePanel'); if(!panel)return;
    const {score,stars}=MealAI.score(cur.plate);
    const tip=MealAI.tip(cur.plate);
    const starStr='⭐'.repeat(stars)+'☆'.repeat(5-stars);
    const items=cur.plate.map(p=>{
      const f=MealAI.byId[p.id];
      return `<div class="pi"><span class="pe">${f.emoji}</span><span>${f.th}</span>
        ${p.qty>1?`<span class="qty">×${p.qty}</span>`:''}
        <button class="px" onclick="App.removeFood('${p.id}')" aria-label="เอาออก">−</button></div>`;
    }).join('') || `<div class="plate-empty">🍽️ จานยังว่างอยู่<br>แตะอาหารเพื่อใส่จานเลย!</div>`;

    // circular score ring via SVG
    const circ=2*Math.PI*40, off=circ*(1-score/100);
    const col=score>=72?'var(--good)':score>=34?'var(--sun-d)':'var(--peach-d)';
    panel.innerHTML=`
      <h3>🍽️ จานของฉัน</h3>
      <div class="score-ring">
        <svg class="ring" viewBox="0 0 92 92">
          <circle cx="46" cy="46" r="40" fill="none" stroke="var(--line)" stroke-width="10"/>
          <circle cx="46" cy="46" r="40" fill="none" stroke="${col}" stroke-width="10" stroke-linecap="round"
            stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 46 46)"
            style="transition:stroke-dashoffset .5s"/>
          <text x="46" y="52" text-anchor="middle" font-size="26" font-weight="800" fill="var(--ink)">${score}</text>
        </svg>
        <div class="score-txt"><b>${score}</b><span>/100 คะแนน</span><div class="stars">${starStr}</div></div>
      </div>
      <div class="tip">${tip.emo} ${tip.text}</div>
      <div class="plate-items">${items}</div>
      <button class="btn btn-primary" onclick="App.finishMeal()" ${cur.plate.length?'':'disabled style="opacity:.5"'}>
        ✅ เสร็จแล้ว! ดูเมนู</button>`;
  }
  function bump(){ const p=document.getElementById('platePanel'); if(p){p.style.transform='scale(1.02)';setTimeout(()=>p.style.transform='',150);} }

  /* ---------- SCREEN: result / celebration ---------- */
  function finishMeal(){
    if(!cur.plate.length)return;
    const {score}=MealAI.score(cur.plate);
    Store.saveMeal(cur.meal, cur.plate, score);
    const {dishes,desc}=MealAI.buildMenu(cur.plate);
    const {stars}=MealAI.score(cur.plate);
    const starStr='⭐'.repeat(stars)+'☆'.repeat(5-stars);
    confetti();
    speak('จานนี้ครบแล้ว '+desc.replace(/[🌟😋]/g,''));
    app.innerHTML = topbar('เมนูของฉัน 🎉','mealSelect') + `
      <div class="screen">
        <div class="result-card">
          <div class="party">🎉</div>
          <h1 class="big">จานนี้ครบแล้ว!</h1>
          <div class="stars" style="font-size:30px">${starStr}</div>
          <p class="sub">${score}/100 คะแนน — เก่งมากเลย!</p>
          <div class="desc-box">💡 ${desc}</div>
          <div class="section-title">🍲 เมนูที่ AI จัดให้</div>
          <div class="dish-list">
            ${dishes.map(d=>`<div class="dish"><span class="de">${d.emoji}</span>
              <div>${d.name}${d.qty>1?' ×'+d.qty:''}<small>${d.sub}</small></div></div>`).join('')}
          </div>
          <button class="btn btn-primary" onclick="App.go('mealSelect')">🍽️ ทำมื้ออื่นต่อ</button>
          <button class="btn btn-ghost" style="margin-top:8px" onclick="App.go('home')">🏠 กลับหน้าแรก</button>
        </div>
      </div>`;
    syncSoundBtns();
  }

  function confetti(){
    const wrap=el('<div class="confetti"></div>');document.body.appendChild(wrap);
    const cols=['#FFB4A2','#9EE7C9','#A6D8F5','#FFE08A','#D9B8F0','#FFC2D6'];
    for(let i=0;i<70;i++){const c=el('<div class="cf"></div>');
      c.style.left=Math.random()*100+'%';c.style.background=cols[i%cols.length];
      c.style.animationDuration=(1.8+Math.random()*1.6)+'s';c.style.animationDelay=(Math.random()*.4)+'s';
      c.style.width=c.style.height=(8+Math.random()*8)+'px';wrap.appendChild(c);}
    setTimeout(()=>wrap.remove(),3400);
  }

  /* ---------- sound controls ---------- */
  function toggleSound(){ const on=Store.toggleSound(); syncSoundBtns();
    toast(on?'🔈 เปิดเสียงแล้ว':'🔇 ปิดเสียงแล้ว'); if(on)speak('เปิดเสียงแล้วจ้ะ'); else Speech.stop(); }
  function replay(){ if(lastSpoken){Speech.say(lastSpoken);} else speak('สวัสดีจ้ะ'); }
  function syncSoundBtns(){
    const on=Store.state.soundOn;
    const b=document.getElementById('btnSound');
    if(b){b.textContent=on?'🔈':'🔇';b.classList.toggle('on',on);}
    if(!Speech.supported){ const r=document.getElementById('btnReplay'); if(r){r.style.opacity=.4;r.title='อุปกรณ์นี้ยังไม่รองรับเสียง';} }
  }

  /* ---------- ROUTER ---------- */
  const routes={
    home:screenHome, mealSelect:screenMealSelect, builder:screenBuilder,
    parentPin:()=>Parent.pin(), parentDash:()=>Parent.dash()
  };
  function go(name){ Speech.stop(); (routes[name]||screenHome)(); window.scrollTo({top:0,behavior:'smooth'}); }

  return {
    boot(){ go('home'); },
    go, pickUser, pickMeal, setCat, onSearch, openFood, closeModal,
    addFood, removeFood, speakName, finishMeal, toggleSound, replay,
    // expose for Parent module
    _internal:{CAT,MEALS,USERS,toast,topbar,el,syncSoundBtns,speak},
    _modal:null
  };
})();
</script>

<script>
/* ============================================================
   7. PARENT MODULE  —  PIN gate, dashboard, reports,
   charts, behavior report, history, CSV/PDF export
   ============================================================ */
const Parent = (function(){
  const app=document.getElementById('app');
  const {topbar,el,toast}=App._internal;
  const CAT=App._internal.CAT, MEALS=App._internal.MEALS, USERS=App._internal.USERS;
  const byId=MealAI.byId;

  let pinBuf='';
  let _wipeModal=null;   // reference to the custom "clear data" confirm modal
  let view='hana';       // hana | haki | both
  let range='today';     // today | yesterday | 7 | 30

  /* ---- PIN gate (4 digits, default 1234) ---- */
  function pin(){
    pinBuf='';
    app.innerHTML = topbar('สำหรับผู้ปกครอง 🔒','home') + `
      <div class="screen"><div class="pin-pad">
        <div style="font-size:60px">🔒</div>
        <h1 class="big" style="font-size:26px">ใส่รหัส PIN 4 หลัก</h1>
        <p class="note">รหัสเริ่มต้นคือ <b>1234</b> (เปลี่ยนได้ในหน้าถัดไป)</p>
        <div class="pin-dots" id="pinDots">${[0,1,2,3].map(()=>'<div class="pin-dot"></div>').join('')}</div>
        <div class="pin-err" id="pinErr"></div>
        <div class="pin-keys">
          ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="Parent.key('${n}')">${n}</button>`).join('')}
          <button class="pin-key" onclick="Parent.clear()">⌫</button>
          <button class="pin-key" onclick="Parent.key('0')">0</button>
          <button class="pin-key" onclick="Parent.ok()">✓</button>
        </div>
      </div></div>`;
    Speech.stop();
  }
  function drawDots(){ const d=document.getElementById('pinDots');
    if(d)[...d.children].forEach((x,i)=>x.classList.toggle('on',i<pinBuf.length)); }
  function key(n){ if(pinBuf.length<4){pinBuf+=n;drawDots();} if(pinBuf.length===4)setTimeout(ok,150); }
  function clear(){ pinBuf=''; drawDots(); document.getElementById('pinErr').textContent=''; }
  function ok(){
    if(pinBuf.length<4)return;
    if(pinBuf===Store.getPin()){ view='hana';range='today'; dash(); }
    else{ document.getElementById('pinErr').textContent='รหัสไม่ถูกต้อง ลองอีกครั้งนะ'; pinBuf='';drawDots();
      const p=document.querySelector('.pin-pad'); p.style.animation='none';p.offsetHeight;p.style.animation='pop .3s'; }
  }

  /* ---- date helpers ---- */
  function dateStr(offset){ const d=new Date(); d.setDate(d.getDate()-offset); return d.toISOString().slice(0,10); }
  function rangeDates(){
    if(range==='today')return[dateStr(0)];
    if(range==='yesterday')return[dateStr(1)];
    const n=parseInt(range,10); return Array.from({length:n},(_,i)=>dateStr(i));
  }
  function usersInView(){ return view==='both'?['hana','haki']:[view]; }

  /* ---- aggregate stats over range ---- */
  function collect(){
    const days=rangeDates(), users=usersInView();
    const rows=[]; // each saved meal
    users.forEach(u=>days.forEach(d=>{
      const day=Store.getDay(u,d);
      Object.entries(day).forEach(([meal,rec])=>{
        rows.push({user:u,date:d,meal,...rec});
      });
    }));
    return rows;
  }
  function itemsOf(rows,cat){
    const out=[];
    rows.forEach(r=>r.items.forEach(it=>{const f=byId[it.id]; if(f&&(!cat||f.cat===cat))for(let i=0;i<it.qty;i++)out.push(f);}));
    return out;
  }
  /* ALWAYS recompute Healthy Score from the saved food items with the current
     formula — never trust the score stored in localStorage. This makes old
     saved meals show up-to-date scores automatically, with no data reset. */
  function liveScore(row){ return MealAI.score(row.items||[]).score; }

  /* ---- DASHBOARD ---- */
  function dash(){
    const rows=collect();
    const mealsEaten=rows.length;
    const scoreAvg=rows.length?Math.round(rows.reduce((a,b)=>a+liveScore(b),0)/rows.length):0;
    const carb=itemsOf(rows,'carb'), prot=itemsOf(rows,'protein'), veg=itemsOf(rows,'veg'), fruit=itemsOf(rows,'fruit'), drink=itemsOf(rows,'drink');
    const uniq=arr=>new Set(arr.map(f=>f.id)).size;

    // meals not yet chosen today (only meaningful for today/yesterday single day)
    const singleDay=(range==='today'||range==='yesterday');
    const chosenMealTypes=new Set(rows.map(r=>r.meal));
    const missing=Object.keys(MEALS).filter(m=>!chosenMealTypes.has(m));

    app.innerHTML = topbar('แดชบอร์ดผู้ปกครอง 👨‍👩‍👧','home') + `
      <div class="screen" id="dashRoot">
        <div class="seg no-print">
          ${[['hana','👧 ฮานะ'],['haki','🧒 ฮาคิ'],['both','👧🧒 ทั้งคู่']].map(([k,l])=>
            `<button class="${view===k?'active':''}" onclick="Parent.setView('${k}')">${l}</button>`).join('')}
        </div>
        <div class="seg no-print">
          ${[['today','วันนี้'],['yesterday','เมื่อวาน'],['7','7 วัน'],['30','30 วัน']].map(([k,l])=>
            `<button class="${range===k?'active':''}" onclick="Parent.setRange('${k}')">${l}</button>`).join('')}
        </div>

        <div class="stat-grid">
          <div class="stat"><div class="ic">🍽️</div><div class="v">${mealsEaten}</div><div class="l">มื้อที่เลือกแล้ว</div></div>
          <div class="stat"><div class="ic">💯</div><div class="v">${scoreAvg}</div><div class="l">คะแนนเฉลี่ย</div></div>
          <div class="stat"><div class="ic">🥦</div><div class="v">${uniq(veg)}</div><div class="l">ผักไม่ซ้ำ</div></div>
          <div class="stat"><div class="ic">🍎</div><div class="v">${uniq(fruit)}</div><div class="l">ผลไม้ไม่ซ้ำ</div></div>
        </div>

        ${singleDay?`<div class="panel">
          <h3>📅 สรุป${range==='today'?'วันนี้':'เมื่อวาน'}</h3>
          <div class="report-line"><span>✅</span><span class="k">มื้อที่รับประทานแล้ว</span><span class="v">${[...chosenMealTypes].map(m=>MEALS[m].th).join(', ')||'—'}</span></div>
          <div class="report-line"><span>⏳</span><span class="k">มื้อที่ยังไม่ได้เลือก</span><span class="v">${missing.map(m=>MEALS[m].th).join(', ')||'ครบทุกมื้อ 🎉'}</span></div>
          <div class="report-line"><span>🍚</span><span class="k">แป้งที่เลือก</span><span class="v">${uniq(carb)} ชนิด</span></div>
          <div class="report-line"><span>🍗</span><span class="k">โปรตีนที่เลือก</span><span class="v">${uniq(prot)} ชนิด</span></div>
          <div class="report-line"><span>🥦</span><span class="k">ผักที่เลือก</span><span class="v">${uniq(veg)} ชนิด</span></div>
          <div class="report-line"><span>🍎</span><span class="k">ผลไม้ที่เลือก</span><span class="v">${uniq(fruit)} ชนิด</span></div>
          <div class="report-line"><span>🥛</span><span class="k">เครื่องดื่มที่เลือก</span><span class="v">${uniq(drink)} ชนิด</span></div>
          <div class="report-line"><span>💯</span><span class="k">Healthy Score เฉลี่ย</span><span class="v">${scoreAvg}/100</span></div>
        </div>`:''}

        ${!singleDay?weeklyPanel(rows):''}

        ${chartPanel(rows)}

        ${varietyPanel(carb,prot,veg,fruit)}

        ${behaviorPanel(rows,scoreAvg,uniq(veg),uniq(fruit),uniq(prot))}

        <div class="panel no-print">
          <h3>📤 ส่งออกข้อมูล</h3>
          <div class="export-row">
            <button class="btn btn-warn" onclick="Parent.exportCSV()">📄 CSV</button>
            <button class="btn btn-soft" onclick="window.print()">🖨️ PDF (พิมพ์/บันทึก)</button>
          </div>
          <p class="note" style="margin-top:10px">PDF: กด “PDF” แล้วเลือก “บันทึกเป็น PDF” ในหน้าต่างพิมพ์ของเบราว์เซอร์</p>
        </div>

        <div class="panel no-print">
          <h3>🔑 เปลี่ยนรหัส PIN</h3>
          <div class="export-row">
            <button class="btn btn-soft" onclick="Parent.changePin()">ตั้งรหัสใหม่</button>
            <button type="button" class="btn btn-danger" onclick="Parent.wipe()">🧹 ล้างข้อมูลทั้งหมด</button>
          </div>
        </div>
      </div>`;
    App._internal.syncSoundBtns();
  }

  function weeklyPanel(rows){
    // count of each meal type
    const cnt={}; Object.keys(MEALS).forEach(m=>cnt[m]=0);
    rows.forEach(r=>cnt[r.meal]=(cnt[r.meal]||0)+1);
    // most & never chosen foods
    const all=itemsOf(rows,null);
    const freq={}; all.forEach(f=>freq[f.id]=(freq[f.id]||0)+1);
    const top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,n])=>({f:byId[id],n}));
    return `<div class="panel">
      <h3>📈 สรุปช่วง ${range} วัน</h3>
      <div class="report-line"><span class="k">จำนวนครั้งของแต่ละมื้อ</span></div>
      ${Object.entries(cnt).map(([m,n])=>`<div class="report-line"><span>${MEALS[m].emo}</span><span class="k">${MEALS[m].th}</span><span class="v">${n} ครั้ง</span></div>`).join('')}
      <div class="report-line" style="margin-top:8px"><span>⭐</span><span class="k">อาหารที่เลือกบ่อยที่สุด</span></div>
      <div class="pill-list">${top.length?top.map(t=>`<span class="pill">${t.f.emoji} ${t.f.th} ×${t.n}</span>`).join(''):'<span class="note">ยังไม่มีข้อมูล</span>'}</div>
    </div>`;
  }

  function varietyPanel(carb,prot,veg,fruit){
    const kinds=arr=>[...new Set(arr.map(f=>f.id))].map(id=>byId[id]);
    const chip=arr=>arr.length?arr.slice(0,20).map(f=>`<span class="pill">${f.emoji} ${f.th}</span>`).join(''):'<span class="note">ยังไม่มีข้อมูลในช่วงนี้</span>';
    return `<div class="panel">
      <h3>🌈 ความหลากหลายของอาหาร</h3>
      <div class="section-title">🍚 แป้ง (${kinds(carb).length})</div><div class="pill-list">${chip(kinds(carb))}</div>
      <div class="section-title">🍗 โปรตีน (${kinds(prot).length})</div><div class="pill-list">${chip(kinds(prot))}</div>
      <div class="section-title">🥦 ผัก (${kinds(veg).length})</div><div class="pill-list">${chip(kinds(veg))}</div>
      <div class="section-title">🍎 ผลไม้ (${kinds(fruit).length})</div><div class="pill-list">${chip(kinds(fruit))}</div>
    </div>`;
  }

  // Bar chart: Healthy score + protein/veg/fruit counts per day across range
  function chartPanel(rows){
    const days=rangeDates().slice().reverse();
    const label=d=>{const dt=new Date(d);return (dt.getMonth()+1)+'/'+dt.getDate();};
    // per-day avg score
    const perDay=days.map(d=>{
      const rs=rows.filter(r=>r.date===d);
      const sc=rs.length?Math.round(rs.reduce((a,b)=>a+liveScore(b),0)/rs.length):0;
      const carb=new Set(); const veg=new Set(); const fruit=new Set(); const prot=new Set();
      rs.forEach(r=>r.items.forEach(it=>{const f=byId[it.id];if(!f)return;
        if(f.cat==='carb')carb.add(f.id);if(f.cat==='veg')veg.add(f.id);if(f.cat==='fruit')fruit.add(f.id);if(f.cat==='protein')prot.add(f.id);}));
      return {d,sc,carb:carb.size,veg:veg.size,fruit:fruit.size,prot:prot.size};
    });
    const maxScore=100;
    const bars=(key,color,unit)=>{
      const max=key==='sc'?100:Math.max(3,...perDay.map(p=>p[key]));
      return `<div class="bars">${perDay.map(p=>{
        const h=Math.round((p[key]/max)*100);
        return `<div class="bar-col"><span class="bv">${p[key]}${unit||''}</span>
          <div class="bar" style="height:${h}%;background:${color}"></div>
          <span class="bl">${label(p.d)}</span></div>`;}).join('')}</div>`;
    };
    return `<div class="panel">
      <h3>📊 กราฟสถิติ</h3>
      <div class="section-title">💯 Healthy Score</div>
      ${bars('sc','linear-gradient(180deg,var(--mint-d),var(--mint))','')}
      <div class="section-title">🍚 แป้ง (ชนิดต่อวัน)</div>
      ${bars('carb','linear-gradient(180deg,var(--sun-d),var(--sun))','')}
      <div class="section-title">🥦 ผัก (ชนิดต่อวัน)</div>
      ${bars('veg','linear-gradient(180deg,var(--mint-d),var(--sun))','')}
      <div class="section-title">🍎 ผลไม้ (ชนิดต่อวัน)</div>
      ${bars('fruit','linear-gradient(180deg,var(--rose-d),var(--rose))','')}
      <div class="section-title">🍗 โปรตีน (ชนิดต่อวัน)</div>
      ${bars('prot','linear-gradient(180deg,var(--peach-d),var(--peach))','')}
    </div>`;
  }

  // Positive-only behavior report
  function behaviorPanel(rows,scoreAvg,vegK,fruitK,protK){
    const who=view==='both'?'ฮานะและฮาคิ':USERS[view].nm;
    let lines=[];
    if(!rows.length){
      lines.push(`ยังไม่มีข้อมูลในช่วงนี้ ชวน${who}มาเลือกอาหารสนุก ๆ กันได้เลยนะ 😊`);
    }else{
      lines.push(`ช่วงนี้${who}เลือกอาหารไปแล้ว ${rows.length} มื้อ เก่งมากเลย! 🎉`);
      if(scoreAvg>=72) lines.push(`คะแนนสุขภาพเฉลี่ยสูงถึง ${scoreAvg}/100 แสดงว่า${who}เลือกอาหารได้สมดุลมาก ๆ 🌟`);
      else if(scoreAvg>=40) lines.push(`คะแนนเฉลี่ย ${scoreAvg}/100 กำลังไปได้สวย ลองชวนเพิ่มผักหรือผลไม้อีกนิดจะยิ่งเยี่ยม 🥦🍎`);
      else lines.push(`${who}เริ่มต้นได้ดีแล้ว ทุกครั้งที่เลือกเองคือการเรียนรู้ที่ดี ค่อย ๆ เพิ่มความหลากหลายไปด้วยกันนะ 💚`);
      if(vegK>=3) lines.push(`เลือกผักได้หลากหลายถึง ${vegK} ชนิด ชอบลองของใหม่มาก น่าชื่นชม! 🌈`);
      if(fruitK>=2) lines.push(`ชอบผลไม้หลายชนิด (${fruitK} แบบ) เป็นนิสัยที่ดีต่อสุขภาพมาก 🍓`);
      if(protK>=2) lines.push(`ได้รับโปรตีนจากหลายแหล่ง ช่วยให้ร่างกายแข็งแรงเติบโตดี 💪`);
    }
    return `<div class="panel">
      <h3>💬 รายงานพฤติกรรม (เชิงบวก)</h3>
      <div class="behavior">${lines.map(l=>'• '+l).join('<br>')}</div>
    </div>`;
  }

  /* ---- controls ---- */
  function setView(v){view=v;dash();}
  function setRange(r){range=r;dash();}

  /* ---- export CSV ---- */
  function exportCSV(){
    const rows=collect();
    const head=['user','date','meal','healthy_score','food_th','food_en','category','qty'];
    const lines=[head.join(',')];
    rows.forEach(r=>r.items.forEach(it=>{
      const f=byId[it.id]; if(!f)return;
      lines.push([USERS[r.user].nm,r.date,MEALS[r.meal].th,liveScore(r),
        '"'+f.th+'"','"'+f.en+'"',CAT[f.cat].th,it.qty].join(','));
    }));
    if(rows.length===0)lines.push('ยังไม่มีข้อมูล');
    const blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download='kids-meal-'+view+'-'+range+'.csv';a.click();URL.revokeObjectURL(url);
    toast('📄 ส่งออก CSV แล้ว');
  }

  function changePin(){
    const np=prompt('ตั้งรหัส PIN ใหม่ (ตัวเลข 4 หลัก):');
    if(np&&/^\d{4}$/.test(np)){ Store.setPin(np); toast('🔑 เปลี่ยนรหัสแล้ว'); }
    else if(np!==null) alert('กรุณาใส่ตัวเลข 4 หลักเท่านั้น');
  }
  /* ---- Clear-all-data flow (custom modal, no native confirm) ----
     Native confirm() can be unreliable/blocked inside some in-app
     browsers on iOS. A DOM modal works consistently on iPhone Safari,
     Chrome mobile and desktop. PIN is never touched here. */
  function wipe(){
    closeWipe(); // guard against double-open
    const modal=el(`<div class="modal" id="wipeModal" onclick="if(event.target===this)Parent.closeWipe()">
      <div class="modal-card" style="text-align:center">
        <button class="close-x" onclick="Parent.closeWipe()" aria-label="ปิด">✕</button>
        <div class="big-emo">🧹</div>
        <h2 class="confirm-title">ต้องการล้างข้อมูลอาหารทั้งหมดใช่ไหม?</h2>
        <p class="note" style="margin:8px 0 18px">ประวัติการเลือกอาหารทั้งหมดจะถูกลบ<br>(รหัส PIN จะยังอยู่เหมือนเดิม)</p>
        <div class="modal-actions">
          <button type="button" class="btn btn-soft" onclick="Parent.closeWipe()">ยกเลิก</button>
          <button type="button" class="btn btn-danger" onclick="Parent.confirmWipe()">ยืนยันล้างข้อมูล</button>
        </div>
      </div></div>`);
    document.body.appendChild(modal);
    _wipeModal=modal;
  }
  function closeWipe(){ if(_wipeModal){ _wipeModal.remove(); _wipeModal=null; } }
  function confirmWipe(){
    Store.clearMeals();     // wipe meal history only — PIN preserved
    closeWipe();
    dash();                 // back to the dashboard (now empty)
    toast('✅ ล้างข้อมูลเรียบร้อยแล้ว');
  }

  return { pin,key,clear,ok,dash,setView,setRange,exportCSV,changePin,wipe,closeWipe,confirmWipe };
})();

/* ============================================================
   8. APP BOOT
   ============================================================ */
window.addEventListener('DOMContentLoaded',()=>{
  // warm up speech voices (some browsers load async)
  if('speechSynthesis' in window){ try{speechSynthesis.getVoices();}catch(e){} }
  App.boot();
});
</script>
</body>
</html>
